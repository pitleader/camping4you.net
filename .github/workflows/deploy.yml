name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    # Docs/governance-only changes don't change the site — skip the deploy.
    paths-ignore:
      - '.agent/**'
      - 'archive/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate the deploy on green checks + build.
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Deploy
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=camping4you --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
