name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    # Docs/governance-only changes don't change the site — skip the deploy.
    paths-ignore:
      - '.agent/**'
      - 'archive/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate the deploy on green checks + build.
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Deploy
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name=camping4you --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Tell IndexNow (Bing, Yandex, etc.) to re-crawl. The key is published as a
      # public static file at /<key>.txt — IndexNow keys are public by design.
      # Non-fatal: indexing must never gate a deploy.
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          KEY=e89cd128bd5a92f820be5da89bb1d1c9
          curl -sS -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json' \
            -d '{
              "host": "camping4you.net",
              "key": "'"$KEY"'",
              "keyLocation": "https://camping4you.net/'"$KEY"'.txt",
              "urlList": [
                "https://camping4you.net/",
                "https://camping4you.net/rates",
                "https://camping4you.net/rules",
                "https://camping4you.net/contact",
                "https://camping4you.net/privacy",
                "https://camping4you.net/terms",
                "https://camping4you.net/sms-sample"
              ]
            }'
