name: CI

on:
  push:
    branches: ['**']
    # Docs/governance-only changes don't affect the build.
    paths-ignore:
      - '.agent/**'
      - 'archive/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build
