{{ define "main" }}
<section class="max-w-4xl mx-auto">
    <h1 class="text-center text-3xl font-bold mb-6">{{ .Title }}</h1>
    <div class="prose max-w-none mb-6">{{ .Content }}</div>
    <ul class="list-disc list-inside">
        <li>
            Call or Text:
            <a href="tel:{{ .Params.phone }}"><span class="font-bold">{{ .Params.phone }}</span></a>
        </li>
        <li>
            Email:
            <a href="mailto:{{ .Params.email }}"><span class="font-bold">{{ .Params.email }}</span></a>
        </li>
    </ul>
</section>
{{ end }}
