{{ define "main" }}
<h1 class="text-center text-3xl font-bold mb-6">{{ .Title }}</h1>

{{ with .Content }}
<div class="prose max-w-none mb-8">{{ . }}</div>
{{ end }}

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {{ with .Params.phone }}
    <div class="border border-gray-200 rounded p-4">
        <p class="text-sm text-gray-500 mb-1">Phone</p>
        <a href="tel:{{ replaceRE "[^0-9]" "" . }}" class="font-semibold">{{ . }}</a>
    </div>
    {{ end }}
    {{ with .Params.email }}
    <div class="border border-gray-200 rounded p-4">
        <p class="text-sm text-gray-500 mb-1">Email</p>
        <a href="mailto:{{ . }}" class="font-semibold">{{ . }}</a>
    </div>
    {{ end }}
    {{ with .Params.address }}
    <div class="border border-gray-200 rounded p-4">
        <p class="text-sm text-gray-500 mb-1">Address</p>
        <p class="font-semibold">{{ . }}</p>
    </div>
    {{ end }}
    {{ with .Params.hours }}
    <div class="border border-gray-200 rounded p-4">
        <p class="text-sm text-gray-500 mb-1">Hours</p>
        <p class="font-semibold">{{ . }}</p>
    </div>
    {{ end }}
</div>
{{ end }}
