{{ define "main" }}
<header class="mb-6">
    <h1 class="text-4xl font-bold">{{ .Title }}</h1>
</header>
<ul class="space-y-4">
    {{ range .Pages }}
    <li class="border border-gray-200 rounded p-4">
        <h2 class="text-2xl font-semibold">
            <a href="{{ .Permalink }}" class="hover:underline">{{ .Title }}</a>
        </h2>
        <p class="text-gray-500 text-sm">
            Published on {{ .Date.Format "January 2, 2006" }}
        </p>
        <p class="text-gray-700">{{ .Summary }}</p>
    </li>
    {{ end }}
</ul>
{{ end }}
