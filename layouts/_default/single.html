{{ define "main" }}
<article class="max-w-4xl mx-auto">
    <header class="mb-6">
        <h1 class="text-center text-3xl font-bold">{{ .Title }}</h1>
        <p class="text-center text-sm text-gray-600">
            Published on {{ .Date.Format "January 2, 2006" }}
        </p>
    </header>
    <div class="prose max-w-none">{{ .Content }}</div>
</article>
{{ end }}
