<header class="bg-gray-800 text-white">
    <div class="max-w-4xl mx-auto flex items-center justify-between px-4 py-3">
        <a href="/" class="text-2xl font-bold text-white hover:text-gray-200">Leisure Oaks Park</a>

        <nav class="hidden md:flex space-x-6">
            <a href="/" class="text-white {{ if .IsHome }}underline font-bold{{ else }}hover:underline{{ end }}">Home</a>
            <a href="/rates/" class="text-white {{ if eq .RelPermalink "/rates/" }}underline font-bold{{ else }}hover:underline{{ end }}">Rates</a>
            <a href="/rules/" class="text-white {{ if eq .RelPermalink "/rules/" }}underline font-bold{{ else }}hover:underline{{ end }}">Rules</a>
            <a href="/compliance/" class="text-white {{ if eq .RelPermalink "/compliance/" }}underline font-bold{{ else }}hover:underline{{ end }}">Terms & Privacy</a>
            <a href="/contact/" class="text-white {{ if eq .RelPermalink "/contact/" }}underline font-bold{{ else }}hover:underline{{ end }}">Contact</a>
        </nav>

        <button id="menu-toggle" class="block md:hidden text-white" onclick="toggleMenu()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7"></path>
            </svg>
        </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-gray-700">
        <nav class="flex flex-col space-y-2 px-4 py-3">
            <a href="/" class="text-white {{ if .IsHome }}underline font-bold{{ else }}hover:underline{{ end }}">Home</a>
            <a href="/rates/" class="text-white {{ if eq .RelPermalink "/rates/" }}underline font-bold{{ else }}hover:underline{{ end }}">Rates</a>
            <a href="/rules/" class="text-white {{ if eq .RelPermalink "/rules/" }}underline font-bold{{ else }}hover:underline{{ end }}">Rules</a>
            <a href="/compliance/" class="text-white {{ if eq .RelPermalink "/compliance/" }}underline font-bold{{ else }}hover:underline{{ end }}">Terms & Privacy</a>
            <a href="/contact/" class="text-white {{ if eq .RelPermalink "/contact/" }}underline font-bold{{ else }}hover:underline{{ end }}">Contact</a>
        </nav>
    </div>
</header>
